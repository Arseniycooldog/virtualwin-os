<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>VirtualWin OS v34.3 - Bomb Key Update</title>
    <style>
        :root { --win-bg: #ffffff; --text: #000; --head: #ebebeb; --accent: #0078d7; --border: rgba(0,0,0,0.2); }
        .dark-theme { --win-bg: #1e1e1e; --text: #eee; --head: #323233; --border: #444; }
        
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; user-select: none; }
        #os-root { width: 100vw; height: 100vh; position: relative; background: url('https://images.wallpaperscraft.ru/image/single/gora_vershina_sneg_140026_1920x1080.jpg') center/cover; }

        .desktop { position: absolute; top:0; left:0; width:100%; height:calc(100% - 45px); padding: 25px; display: flex; flex-direction: column; flex-wrap: wrap; align-content: flex-start; gap: 15px; z-index: 5; }
        .icon { width: 80px; text-align: center; color: white; cursor: pointer; text-shadow: 1px 1px 3px #000; padding: 10px; transition: 0.1s; border: 1px solid transparent; }
        .icon:hover { background: rgba(255,255,255,0.2); border-radius: 5px; }
        .icon b { font-size: 32px; display: block; margin-bottom: 4px; }
        .icon span { font-size: 11px; font-weight: 500; }

        .win { position: absolute; background: var(--win-bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; box-shadow: 0 15px 50px rgba(0,0,0,0.5); overflow: hidden; z-index: 100; }
        .win-head { height: 32px; background: var(--head); display: flex; align-items: center; justify-content: space-between; padding-left: 12px; cursor: move; border-bottom: 1px solid var(--border); font-size: 12px; }
        .win-ops button { width: 45px; height: 32px; border: none; background: transparent; color: var(--text); cursor: pointer; }
        .win-ops .close:hover { background: #e81123; color: white; }

        .app-toolbar { height: 40px; background: var(--head); display: flex; align-items: center; padding: 0 10px; gap: 10px; border-bottom: 1px solid var(--border); }
        .url-bar { flex: 1; height: 24px; border-radius: 4px; border: 1px solid var(--border); background: var(--win-bg); padding: 0 10px; color: var(--text); font-size: 12px; }

        .taskbar { position: absolute; bottom: 0; width: 100%; height: 45px; background: rgba(20,20,20,0.8); backdrop-filter: blur(15px); display: flex; align-items: center; z-index: 9999; }
        .start-btn { width: 50px; height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .tabs { flex: 1; display: flex; padding: 0 10px; gap: 5px; }
        .tab { padding: 0 15px; height: 100%; color: white; display: flex; align-items: center; font-size: 11px; border-bottom: 3px solid var(--accent); cursor: pointer; background: rgba(255,255,255,0.05); }

        #game-container { position: relative; width: 100%; height: 100%; background: #141013; }
        #game-ui { position: absolute; top: 10px; left: 10px; pointer-events: none; z-index: 10; }
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
    </style>
</head>
<body class="dark-theme">

<div id="os-root">
    <div class="desktop" id="desktop"></div>
    <div class="taskbar">
        <div class="start-btn"><img src="https://upload.wikimedia.org/wikipedia/commons/5/5f/Windows_logo_-_2012.svg" width="20"></div>
        <div class="tabs" id="task-tabs"></div>
        <div id="clock" style="color:white; font-size:11px; padding-right:15px; text-align:right;"></div>
    </div>
</div>

<script>
    const SYSTEM = {
        apps: {
            spelunky: { title: 'Spelunky Pro', icon: '📦', w: 850, h: 580 },
            explorer: { title: 'Проводник', icon: '📂', w: 700, h: 450 },
            browser: { title: 'Браузер', icon: '🌐', w: 900, h: 600 },
            settings: { title: 'Параметры', icon: '⚙️', w: 350, h: 300 }
        },
        opened: {}, zIndex: 1000
    };

    function initOS() {
        const desk = document.getElementById('desktop');
        for(let id in SYSTEM.apps) {
            desk.innerHTML += `<div class="icon" ondblclick="openApp('${id}')"><b>${SYSTEM.apps[id].icon}</b><span>${SYSTEM.apps[id].title}</span></div>`;
        }
        setInterval(() => {
            const d = new Date();
            document.getElementById('clock').innerHTML = d.toLocaleTimeString() + "<br>" + d.toLocaleDateString();
        }, 1000);
    }

    window.openApp = function(id) {
        if(SYSTEM.opened[id]) return focusApp(id);
        const app = SYSTEM.apps[id];
        const win = document.createElement('div');
        win.id = `win-${id}`; win.className = 'win';
        win.style.width = app.w+'px'; win.style.height = app.h+'px';
        win.style.left = (100 + Object.keys(SYSTEM.opened).length * 25) + 'px';
        win.style.top = (60 + Object.keys(SYSTEM.opened).length * 25) + 'px';
        win.style.zIndex = ++SYSTEM.zIndex;

        win.innerHTML = `
            <div class="win-head" onmousedown="dragWin(event, '${id}')">
                <span>${app.icon} ${app.title}</span>
                <div class="win-ops">
                    <button onclick="document.getElementById('win-${id}').style.display='none'">—</button>
                    <button class="close" onclick="closeApp('${id}')">✕</button>
                </div>
            </div>
            <div id="body-${id}" style="flex:1; display:flex; flex-direction:column; overflow:hidden;"></div>
        `;
        document.getElementById('os-root').appendChild(win);
        SYSTEM.opened[id] = true; updateTabs();
        
        const container = document.getElementById(`body-${id}`);
        if(id === 'spelunky') initGame();
        if(id === 'browser') {
            container.innerHTML = `<div class="app-toolbar"><input type="text" class="url-bar" value="https://www.google.com/search?q=VirtualWin&igu=1"></div>
                <iframe src="https://www.google.com/search?q=VirtualWin&igu=1" style="flex:1; border:none; background:white;"></iframe>`;
        }
        if(id === 'explorer') {
            container.innerHTML = `<div class="app-toolbar"><span style="font-size:11px;">🏠 Этот компьютер > Локальный диск (C:)</span></div>
                <div style="display:flex; height:100%;"><div style="width:140px; background:var(--head); padding:10px; font-size:11px;">💾 C: Drive<br>📀 D: Drive</div><div style="flex:1; padding:15px; display:grid; grid-template-columns:repeat(3, 1fr); gap:10px;"><div>📁 Docs</div><div>📁 Games</div><div>📄 info.txt</div></div></div>`;
        }
        if(id === 'settings') {
            container.innerHTML = `<div style="padding:20px;"><h3>Оформление</h3><button onclick="document.body.className=''">Светлая тема</button> <button onclick="document.body.className='dark-theme'">Темная тема</button></div>`;
        }
    }

    window.closeApp = (id) => { document.getElementById(`win-${id}`).remove(); delete SYSTEM.opened[id]; updateTabs(); }
    window.focusApp = (id) => { let w = document.getElementById(`win-${id}`); w.style.display = 'flex'; w.style.zIndex = ++SYSTEM.zIndex; }
    window.dragWin = (e, id) => {
        let w = document.getElementById(`win-${id}`); focusApp(id);
        let ox = e.clientX-w.offsetLeft, oy = e.clientY-w.offsetTop;
        const mm = (ev) => { w.style.left=(ev.clientX-ox)+'px'; w.style.top=(ev.clientY-oy)+'px'; };
        const mu = () => window.removeEventListener('mousemove', mm);
        window.addEventListener('mousemove', mm); window.addEventListener('mouseup', mu);
    }
    function updateTabs() {
        const t = document.getElementById('task-tabs'); t.innerHTML = '';
        for(let id in SYSTEM.opened) t.innerHTML += `<div class="tab" onclick="focusApp('${id}')">${SYSTEM.apps[id].icon} ${SYSTEM.apps[id].title}</div>`;
    }

    // --- GAME ENGINE ---
    function initGame() {
        const body = document.getElementById('body-spelunky');
        body.innerHTML = `<div id="game-container">
            <div id="game-ui">
                <div style="background:rgba(0,0,0,0.7); color:white; padding:5px; border-radius:4px; margin-bottom:5px;" id="hp-ui">HP: ❤️❤️❤️❤️</div>
                <div style="background:rgba(0,0,0,0.7); color:white; padding:5px; border-radius:4px; font-size:11px;" id="item-ui">HAND: NONE</div>
                <div style="background:rgba(255,0,0,0.7); color:white; padding:5px; border-radius:4px; font-size:11px;" id="bomb-ui">BOMBS (Z): 4</div>
            </div><canvas id="gc"></canvas>
        </div>`;
        
        const cvs = body.querySelector('#gc'), ctx = cvs.getContext('2d');
        cvs.width = 850; cvs.height = 548;

        let p = { x:100, y:100, vx:0, vy:0, hp:4, bombs:4, back:null, hand:null, dir:1, anim:0, whip:0, invul:0, onG:false };
        let world = [], enemies = [], boxes = [], loot = [], ammo = [], activeBombs = [];

        function genLevel() {
            world = [{x:-50, y:450, w:3500, h:150}];
            enemies = []; boxes = []; loot = []; ammo = []; activeBombs = [];
            for(let i=1; i<25; i++) {
                let rx = i*160, ry = 340 - Math.random()*150;
                world.push({x:rx, y:ry, w:100 + Math.random()*50, h:30});
                if(Math.random()>0.4) boxes.push({x:rx+30, y:ry-35, w:30, h:30});
                if(Math.random()>0.7) enemies.push({x:rx, y:ry-25, vx:1.5, sx:rx, r:80, type: Math.random()>0.5?'spider':'bat'});
            }
            p.x = 100; p.y = 100; p.hp = 4;
        }
        genLevel();

        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if(e.code === 'KeyE') { // PICKUP
                loot.forEach((l, i) => { if(Math.abs(p.x-l.x)<40 && Math.abs(p.y-l.y)<40) { if(l.type==='jetpack') p.back='jetpack'; else if(l.type==='bomb_pack') p.bombs+=3; else p.hand=l.type; loot.splice(i,1); } });
            }
            if(e.code === 'KeyQ' && p.hand) { // DROP
                loot.push({x:p.x + (p.dir*30), y:p.y, type:p.hand, vy:-5, vx:p.dir*8});
                p.hand = null;
            }
            // --- НОВОЕ УПРАВЛЕНИЕ БОМБАМИ НА Z ---
            if(e.code === 'KeyZ' && p.bombs > 0) { 
                activeBombs.push({x: p.x+15, y: p.y+15, vx: p.dir*8, vy: -5, timer: 120});
                p.bombs--;
            }
            if(e.code === 'KeyX') { // USE ITEM / WHIP
                if(p.hand === 'shotgun') { for(let i=-1; i<=1; i++) ammo.push({x:p.x+15, y:p.y+20, vx:p.dir*15, vy:i*0.5, l:40}); }
                else if(p.hand === 'pickaxe') { world.forEach((w,i)=>{ if(w.y<450 && Math.abs(p.x+p.dir*40-w.x)<60) world.splice(i,1); }); }
                else { p.whip = 15; }
                boxes.forEach((bx,i) => { if(Math.abs(p.x-bx.x)<60 && Math.abs(p.y-bx.y)<60) {
                    let r = Math.random(), type = r<0.2?'jetpack':(r<0.5?'shotgun':(r<0.7?'pickaxe':'bomb_pack'));
                    loot.push({x:bx.x, y:bx.y, type:type, vy:-6, vx:(Math.random()-0.5)*5}); 
                    boxes.splice(i,1);
                }});
            }
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function drawItem(type, x, y, dir) {
            ctx.save(); ctx.translate(x, y); ctx.scale(dir, 1);
            if(type === 'pickaxe') { ctx.fillStyle="#8B4513"; ctx.fillRect(-2, -15, 4, 30); ctx.fillStyle="#A9A9A9"; ctx.beginPath(); ctx.arc(0, -12, 10, Math.PI, 0); ctx.fill(); }
            else if(type === 'shotgun') { ctx.fillStyle="#333"; ctx.fillRect(0, -3, 25, 6); ctx.fillStyle="#8B4513"; ctx.fillRect(-10, -2, 15, 8); }
            else if(type === 'jetpack') { ctx.fillStyle="#0055ff"; ctx.fillRect(-8, -10, 16, 20); ctx.fillStyle="#ff4400"; ctx.fillRect(-6, 10, 4, 6); ctx.fillRect(2, 10, 4, 6); }
            else if(type === 'bomb_pack') { ctx.fillStyle="black"; ctx.beginPath(); ctx.arc(0,0,8,0,7); ctx.fill(); ctx.fillStyle="red"; ctx.fillRect(-2,-12,4,4); }
            ctx.restore();
        }

        function drawPlayer() {
            ctx.save(); ctx.translate(p.x+15, p.y+20); ctx.scale(p.dir, 1);
            if(p.back === 'jetpack') {
                ctx.fillStyle="#0055ff"; ctx.fillRect(-15, -10, 12, 22);
                if(keys['Space'] && !p.onG) { ctx.fillStyle="orange"; ctx.beginPath(); ctx.arc(-9, 15, 6+Math.random()*4, 0, 7); ctx.fill(); }
            }
            ctx.strokeStyle = "#1e3a8a"; ctx.lineWidth = 6;
            let moveAnim = p.onG ? Math.sin(p.anim)*12 : 5;
            ctx.beginPath(); ctx.moveTo(-3, 10); ctx.lineTo(-3+moveAnim, 25); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(3, 10); ctx.lineTo(3-moveAnim, 25); ctx.stroke();
            ctx.strokeStyle = "#fcd34d"; ctx.beginPath(); ctx.moveTo(-6, 0); ctx.lineTo(-8-moveAnim/2, 10); ctx.stroke();
            if(p.hand) { ctx.beginPath(); ctx.moveTo(6, 0); ctx.lineTo(12, 5); ctx.stroke(); ctx.translate(12, 5); drawItem(p.hand, 0, 0, 1); ctx.translate(-12, -5); }
            else { ctx.beginPath(); ctx.moveTo(6, 0); ctx.lineTo(8+moveAnim/2, 10); ctx.stroke(); }
            ctx.fillStyle = "#2563eb"; ctx.fillRect(-8, -5, 16, 18);
            ctx.fillStyle = "#fcd34d"; ctx.beginPath(); ctx.arc(0, -15, 10, 0, 7); ctx.fill();
            ctx.fillStyle="black"; ctx.fillRect(2, -18, 3, 3);
            ctx.strokeStyle="black"; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(0, -14, 5, 0.2, Math.PI-0.2); ctx.stroke();
            if(p.whip > 0) { ctx.strokeStyle = "#d97706"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(20, -20, 40+(15-p.whip)*2, Math.sin(p.whip)*10); ctx.stroke(); p.whip--; }
            if(p.invul > 0) { ctx.fillStyle="rgba(255,0,0,0.3)"; ctx.fillRect(-15, -30, 30, 60); p.invul--; }
            ctx.restore();
        }

        function loop() {
            if(!SYSTEM.opened['spelunky']) return requestAnimationFrame(loop);
            if(keys['KeyA']) { p.vx = -4.5; p.dir = -1; p.anim += 0.3; }
            else if(keys['KeyD']) { p.vx = 4.5; p.dir = 1; p.anim += 0.3; }
            else { p.vx *= 0.8; p.anim = 0; }
            if(keys['Space']) { if(p.back === 'jetpack') p.vy -= 1.0; else if(p.onG) p.vy = -11; }
            p.vy += 0.6; p.x += p.vx; p.y += p.vy; p.onG = false;
            world.forEach(w => { if(p.x+22>w.x && p.x+8<w.x+w.w && p.y+45>w.y && p.y<w.y+w.h) { if(p.vy>0){ p.y=w.y-45; p.vy=0; p.onG=true; } } });

            ctx.fillStyle = "#141013"; ctx.fillRect(0,0,850,548); 
            ctx.save(); ctx.translate(-p.x + 400, 0);
            world.forEach(w => { ctx.fillStyle = "#45281a"; ctx.fillRect(w.x, w.y, w.w, w.h); ctx.fillStyle = "#2d5a27"; ctx.fillRect(w.x, w.y, w.w, 8); });
            boxes.forEach(b => { ctx.fillStyle = "#b48554"; ctx.fillRect(b.x, b.y, b.w, b.h); ctx.strokeRect(b.x, b.y, b.w, b.h); });
            loot.forEach(l => { 
                l.vy += 0.5; l.x += l.vx; l.y += l.vy; 
                world.forEach(w => { if(l.x+10>w.x && l.x-10<w.x+w.w && l.y+10>w.y && l.y<w.y+w.h) { l.y=w.y-10; l.vy=0; l.vx*=0.8; } });
                drawItem(l.type, l.x, l.y, 1);
            });
            enemies.forEach((en, ei) => {
                if(en.type === 'bat') { ctx.fillStyle="#800080"; ctx.beginPath(); ctx.moveTo(en.x, en.y); ctx.lineTo(en.x+30, en.y); ctx.lineTo(en.x+15, en.y+20); ctx.fill(); ctx.fillStyle="black"; ctx.beginPath(); ctx.arc(en.x+15, en.y+5, 8, 0, 7); ctx.fill(); }
                else { ctx.fillStyle="#333"; ctx.beginPath(); ctx.arc(en.x+15, en.y+10, 14, 0, 7); ctx.fill(); }
                if(Math.abs(p.x-en.x)<30 && Math.abs(p.y-en.y)<40 && p.invul<=0){ p.hp--; p.invul=50; p.vy=-8; }
            });
            activeBombs.forEach((b, bi) => {
                b.vy += 0.5; b.x += b.vx; b.y += b.vy; b.timer--;
                world.forEach(w => { if(b.x+10>w.x && b.x-10<w.x+w.w && b.y+10>w.y && b.y<w.y+w.h) { b.y=w.y-10; b.vy=0; b.vx*=0.8; } });
                ctx.fillStyle="black"; ctx.beginPath(); ctx.arc(b.x, b.y, 8, 0, 7); ctx.fill();
                if(b.timer <= 0) {
                    ctx.fillStyle="orange"; ctx.beginPath(); ctx.arc(b.x, b.y, 60, 0, 7); ctx.fill();
                    world.forEach((w, wi) => { if(w.y<450 && Math.abs(b.x-w.x)<80 && Math.abs(b.y-w.y)<80) world.splice(wi,1); });
                    enemies.forEach((en, ei) => { if(Math.abs(b.x-(en.x+15))<80 && Math.abs(b.y-(en.y+10))<80) enemies.splice(ei,1); });
                    activeBombs.splice(bi, 1);
                }
            });
            ammo.forEach((a,i) => { a.x+=a.vx; a.y+=a.vy; ctx.fillStyle="#fbbf24"; ctx.beginPath(); ctx.arc(a.x, a.y, 4, 0, 7); ctx.fill(); a.l--; if(a.l<0) ammo.splice(i,1); });
            drawPlayer();
            ctx.restore();
            document.getElementById('hp-ui').innerHTML = `HP: ${"❤️".repeat(p.hp)}`;
            document.getElementById('item-ui').innerHTML = `HAND: ${p.hand || 'NONE'}`;
            document.getElementById('bomb-ui').innerHTML = `BOMBS (Z): ${p.bombs}`;
            if(p.hp<=0) { alert("GAME OVER"); genLevel(); }
            requestAnimationFrame(loop);
        }
        loop();
    }
    initOS();
</script>
</body>
</html>
