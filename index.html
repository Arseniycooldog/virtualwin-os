<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VirtualWin OS v3.0 - Spelunky Physics Evolution</title>
    <style>
        :root { --win-blue: #0078d7; --taskbar-bg: rgba(20, 20, 20, 0.98); --hover-white: rgba(255, 255, 255, 0.15); }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; touch-action: none; }
        #os-root { width: 100vw; height: 100vh; background: linear-gradient(45deg, #1e3c72, #2a5298); background-size: cover; position: relative; transition: background 0.5s; }

        /* Desktop */
        .desktop { padding: 10px; display: flex; flex-direction: column; flex-wrap: wrap; align-content: flex-start; gap: 5px; height: calc(100% - 40px); }
        .icon { width: 74px; height: 85px; padding: 5px; text-align: center; color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; border: 1px solid transparent; transition: 0.1s; user-select: none; border-radius: 3px; }
        .icon:hover { background: var(--hover-white); border: 1px solid rgba(255,255,255,0.1); }
        .icon-img { font-size: 32px; margin-bottom: 4px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }

        /* Windows */
        .window { position: absolute; background: #f3f3f3; border: 1px solid #777; box-shadow: 0 10px 40px rgba(0,0,0,0.5); display: flex; flex-direction: column; z-index: 100; overflow: hidden; }
        .window-header { height: 32px; background: #fff; display: flex; justify-content: space-between; align-items: center; padding: 0 5px 0 10px; cursor: move; }
        .win-content { flex: 1; position: relative; overflow: auto; background: #fff; }
        .win-btn { width: 45px; height: 32px; border: none; background: none; cursor: pointer; font-size: 16px; }
        .win-btn.close:hover { background: #e81123; color: white; }

        /* Start Menu */
        #start-menu { position: absolute; bottom: 40px; left: 0; width: 300px; height: 450px; background: rgba(25, 25, 25, 0.98); backdrop-filter: blur(10px); display: none; flex-direction: column; z-index: 20000; color: white; border: 1px solid #444; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .start-item { padding: 12px 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; font-size: 13px; }
        .start-item:hover { background: var(--hover-white); }

        /* Taskbar */
        .taskbar { position: absolute; bottom: 0; width: 100%; height: 40px; background: var(--taskbar-bg); display: flex; align-items: center; z-index: 10000; backdrop-filter: blur(5px); }
        .start-btn { width: 48px; height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .start-btn:hover { background: var(--hover-white); }
        .win-logo { width: 18px; height: 18px; display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
        .win-logo div { background: white; transition: 0.2s; transform: perspective(20px) rotateY(10deg); }
        .start-btn:hover .win-logo div { background: var(--win-blue); }
        #clock { margin-left: auto; color: white; font-size: 11px; padding-right: 12px; text-align: right; user-select: none; }

        /* Game */
        #game-canvas { display: block; background: #1a1512; outline: none; }
        #game-ui { position: absolute; top: 5px; left: 10px; color: #ffd700; font-family: monospace; font-size: 12px; pointer-events: none; text-shadow: 1px 1px #000; z-index: 10; line-height: 1.2; }
    </style>
</head>
<body>

<div id="os-root">
    <div class="desktop" id="desktop"></div>

    <div id="start-menu">
        <div style="padding: 15px; font-size: 11px; opacity: 0.5; text-transform: uppercase;">Приложения</div>
        <div class="start-item" onclick="openApp('spelunky2')"><span>📦</span> Spelunky 2</div>
        <div class="start-item" onclick="openApp('google')"><span>🌐</span> Google Chrome</div>
        <div class="start-item" onclick="openApp('calc')"><span>➕</span> Калькулятор</div>
        <div class="start-item" onclick="openApp('notepad')"><span>📝</span> Блокнот</div>
        <div class="start-item" onclick="openApp('settings')"><span>⚙️</span> Настройки</div>
    </div>

    <div class="taskbar">
        <div class="start-btn" onclick="toggleStart()">
            <div class="win-logo"><div></div><div></div><div></div><div></div></div>
        </div>
        <div id="clock"></div>
    </div>
</div>

<script>
    // --- ОС ЛОГИКА (Windows 10) ---
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    const apps = {
        'spelunky2': { name: 'Spelunky 2', icon: '📦', w: isMobile ? window.innerWidth : 800, h: isMobile ? 420 : 600 },
        'google': { name: 'Google', icon: '🌐', w: 900, h: 600 },
        'calc': { name: 'Калькулятор', icon: '➕', w: 300, h: 420 },
        'notepad': { name: 'Блокнот', icon: '📝', w: 450, h: 350 },
        'settings': { name: 'Настройки', icon: '⚙️', w: 400, h: 300 }
    };
    let zIndex = 1000;

    function initOS() {
        const desk = document.getElementById('desktop');
        const savedBg = localStorage.getItem('win-bg') || 'linear-gradient(45deg, #1e3c72, #2a5298)';
        document.getElementById('os-root').style.background = savedBg;
        Object.keys(apps).forEach(id => desk.innerHTML += `<div class="icon" onclick="openApp('${id}')"><div class="icon-img">${apps[id].icon}</div>${apps[id].name}</div>`);
        updateClock(); setInterval(updateClock, 1000);
    }

    function toggleStart() { const m = document.getElementById('start-menu'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }
    function updateClock() { const d = new Date(); document.getElementById('clock').innerHTML = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + "<br>" + d.toLocaleDateString(); }

    window.openApp = (id) => {
        if (document.getElementById(`win-${id}`)) return;
        if(document.getElementById('start-menu').style.display === 'flex') toggleStart();
        const win = document.createElement('div');
        win.id = `win-${id}`; win.className = 'window';
        win.style.width = apps[id].w + 'px'; win.style.height = apps[id].h + 'px';
        win.style.top = (50 + Math.random()*50) + 'px'; win.style.left = isMobile ? '0' : (80 + Math.random()*50) + 'px';
        win.style.zIndex = ++zIndex;
        win.onmousedown = () => win.style.zIndex = ++zIndex;
        win.innerHTML = `<div class="window-header" onmousedown="dragStart(event, '${win.id}')"><span style="font-size:12px;">${apps[id].icon} ${apps[id].name}</span><button class="win-btn close" onclick="closeWin('${id}')">✕</button></div>
                         <div class="win-content" style="background:${id==='spelunky2'?'#1a1512':'#fff'}">${renderApp(id)}</div>`;
        document.getElementById('os-root').appendChild(win);
        if(id === 'spelunky2') startSpelunky();
    };

    function renderApp(id) {
        if(id === 'spelunky2') return `<div id="game-ui"></div><canvas id="game-canvas" width="800" height="600" tabindex="1"></canvas>`;
        if(id === 'google') return `<iframe src="https://www.google.com/search?igu=1" style="width:100%;height:100%;border:none;"></iframe>`;
        if(id === 'calc') return `<div style="padding:15px;text-align:right;font-size:28px;background:#eee" id="calc-display">0</div><div style="display:grid;grid-template-columns:repeat(4,1fr);background:#fff">${['7','8','9','/','4','5','6','*','1','2','3','-','C','0','=','+'].map(b=>`<button style="padding:15px;border:1px solid #eee;background:#fff;cursor:pointer" onclick="calc('${b}')">${b}</button>`).join('')}</div>`;
        if(id === 'notepad') return `<textarea style="width:100%;height:100%;border:none;padding:10px;outline:none;font-family:monospace;resize:none;box-sizing:border-box;"></textarea>`;
        if(id === 'settings') return `<div style="padding:15px"><h3>Система</h3><p>Процессор: <b>Virtualwin core v2</b></p><p>ОЗУ: 128 ГБ</p><hr><h3>Обои</h3><button onclick="changeBg('linear-gradient(45deg, #1e3c72, #2a5298)')">Синий</button> <button onclick="changeBg('#2c3e50')">Темный</button></div>`;
    }

    window.calc = (v) => { const d = document.getElementById('calc-display'); if(v==='C') d.innerText='0'; else if(v==='=') d.innerText=eval(d.innerText); else d.innerText=d.innerText==='0'?v:d.innerText+v; };
    window.changeBg = (c) => { document.getElementById('os-root').style.background = c; localStorage.setItem('win-bg', c); };
    window.closeWin = (id) => document.getElementById(`win-${id}`).remove();

    // --- GAME ENGINE: SPELUNKY 2 PRO (Hardcore Physics) ---
    function startSpelunky() {
        const canvas = document.getElementById('game-canvas');
        if(!canvas) return;
        const ctx = canvas.getContext('2d'), ui = document.getElementById('game-ui');
        canvas.focus();

        const TILE = 40, GRAVITY = 0.5, WORLD_W = 3200, WORLD_H = 2000;
        let player = { 
            x: 200, y: 100, vx: 0, vy: 0, w: 22, h: 38, dir: 1, 
            onGround: false, ragdoll: 0, crouch: false, whip: 0, 
            holding: null, hp: 4, hasJetpack: false, hasGun: false, fuel: 100 
        };
        let world = [], entities = [], enemies = [], bullets = [], animTime = 0;
        const keys = {};

        // Генерация уровня с видимыми бордюрами
        for(let y=0; y < WORLD_H/TILE; y++) {
            for(let x=0; x < WORLD_W/TILE; x++) {
                if(y === 48 || (y > 10 && Math.random() > 0.95)) world.push({x: x*TILE, y: y*TILE, type: 'dirt'});
                if(y > 5 && y < 10 && x > 10 && x < 30 && Math.random()>0.8) world.push({x: x*TILE, y: y*TILE, type: 'dirt'}); // Потолок для мышей
            }
        }
        // Коробки
        for(let i=0; i<15; i++) entities.push({ x: 500 + i*250, y: 1800, vx: 0, vy: 0, w: 30, h: 30, type: 'box' });
        // Враги
        for(let i=0; i<8; i++) enemies.push({x: 600+i*400, y: 1850, vx: 2, dir: 1, type: 'snake'});
        for(let i=0; i<5; i++) enemies.push({x: 400+i*500, y: 200, type: 'bat', state: 'hang', tx:0, ty:0});

        window.onkeydown = e => { 
            keys[e.code] = true; 
            if(e.code === 'KeyX' && !player.ragdoll) {
                if(keys['KeyS']) { // S+X: Взять коробку
                    entities.forEach((en, i) => { if(Math.abs(player.x - en.x) < 40 && Math.abs(player.y - en.y) < 40) { player.holding = en; entities.splice(i, 1); } });
                } else if(player.whip <= 0) player.whip = 15; // Кнут
            }
            if(e.code === 'KeyF' && player.hasGun) { // Выстрел
                bullets.push({x: player.x + (player.dir*20), y: player.y+15, vx: player.dir*12});
            }
            if(e.code === 'KeyQ' && player.holding) { // Бросок
                player.holding.x = player.x; player.holding.y = player.y; player.holding.vx = player.dir * 8; player.holding.vy = -5;
                entities.push(player.holding); player.holding = null;
            }
        };
        window.onkeyup = e => keys[e.code] = false;

        function collide(x, y, w, h) { return world.some(b => b.type==='dirt' && x < b.x+TILE && x+w > b.x && y < b.y+TILE && y+h > b.y); }

        function drawStickman(x, y, vx, dir, rag, crouch, whip, holding) {
            ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.lineCap = "round";
            let move = Math.abs(vx) > 0.1 ? Math.sin(animTime * 2) * 10 : 0;
            const hX = x + 11, spineTop = y + (crouch ? 20 : 8);

            if(rag > 0) { // === КРУТОЙ, КРАСИВЫЙ РЕГДОЛЛ ===
                ctx.strokeStyle = "#aaa";
                let limbMult = Math.sin(rag*0.1)*10;
                ctx.beginPath(); ctx.arc(hX + limbMult*0.5, y+28, 5, 0, 7); ctx.stroke(); // Голова
                ctx.beginPath(); ctx.moveTo(x, y+32); ctx.lineTo(x+30, y+35); ctx.stroke(); // Туловище
                // Конечности безвольно разбросаны
                ctx.beginPath(); ctx.moveTo(x, y+32); ctx.lineTo(x-limbMult, y+20); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(x+30, y+35); ctx.lineTo(x+30+limbMult, y+45); ctx.stroke();
                return;
            }

            // Обычное состояние (с руками и ногами)
            ctx.beginPath(); ctx.arc(hX, spineTop, 6, 0, 7); ctx.stroke(); // Голова
            let bBot = y + (crouch ? 32 : 26);
            ctx.beginPath(); ctx.moveTo(hX, spineTop+6); ctx.lineTo(hX, bBot); ctx.stroke(); // Тело
            
            // Ноги
            ctx.beginPath(); ctx.moveTo(hX, bBot); ctx.lineTo(hX + move, y + 38); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(hX, bBot); ctx.lineTo(hX - move, y + 38); ctx.stroke();

            // Руки
            if(holding) { // Взял коробку (руки вверх)
                ctx.beginPath(); ctx.moveTo(hX, spineTop+10); ctx.lineTo(hX-8, y-5); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(hX, spineTop+10); ctx.lineTo(hX+8, y-5); ctx.stroke();
            } else if(player.hasGun) { // Держит пушку
                ctx.beginPath(); ctx.moveTo(hX, spineTop+10); ctx.lineTo(hX+15*dir, spineTop+15); ctx.stroke();
            } else if(whip > 0) { // Кнут
                ctx.strokeStyle = "orange"; ctx.lineWidth=3;
                ctx.beginPath(); ctx.moveTo(hX, spineTop+10); ctx.lineTo(hX + (45*dir), spineTop); ctx.stroke();
                ctx.strokeStyle = "white"; ctx.lineWidth=2;
            } else { // При ходьбе
                let swing = Math.abs(vx) > 0.1 ? -move : 5;
                ctx.beginPath(); ctx.moveTo(hX, spineTop+10); ctx.lineTo(hX + swing*dir, y+25); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(hX, spineTop+10); ctx.lineTo(hX - swing*dir, y+25); ctx.stroke();
            }
            // Джетпак
            if(player.hasJetpack) { ctx.fillStyle="#555"; ctx.fillRect(x-4, spineTop+5, 8, 18); if(keys['Space'] && player.fuel>0 && !player.onGround) { ctx.fillStyle="orange"; ctx.fillRect(x-2, spineTop+23, 4, 8); } }
        }

        function loop() {
            if(!canvas.offsetParent) return;
            player.crouch = keys['KeyS'] && player.onGround;

            if(player.ragdoll <= 0) {
                let speed = player.crouch ? 1.5 : 5;
                if(keys['KeyA']) { player.vx = -speed; player.dir = -1; animTime += 0.2; }
                else if(keys['KeyD']) { player.vx = speed; player.dir = 1; animTime += 0.2; }
                else player.vx *= 0.8;

                if(keys['Space']) {
                    if(player.hasJetpack && player.fuel > 0) { player.vy -= 0.9; player.fuel -= 1; player.onGround = false; }
                    else if(player.onGround && !player.crouch) { player.vy = -11; player.onGround = false; }
                }
            }
            if(player.onGround) player.fuel = Math.min(100, player.fuel+1);

            player.vy += GRAVITY; player.x += player.vx;
            if(collide(player.x, player.y, player.w, player.h)) player.x -= player.vx;
            player.y += player.vy;
            if(collide(player.x, player.y, player.w, player.h)) {
                if(player.vy > 16) player.ragdoll = 70; // Падение = Нокаут
                if(player.vy > 0) player.onGround = true;
                player.y -= player.vy; player.vy = 0;
            } else player.onGround = false;

            if(player.ragdoll > 0) player.ragdoll--;
            
            // Кнут
            if(player.whip > 0) {
                player.whip--;
                let wx = player.x + (player.dir === 1 ? 20 : -45);
                entities.forEach((en, i) => { if(en.type==='box' && Math.abs(wx - en.x) < 40 && Math.abs(player.y - en.y) < 40) { 
                    entities.splice(i, 1); // Ломаем коробку
                    const lootR = Math.random();
                    entities.push({x: en.x, y: en.y, vx:0, vy:-3, w:20, h:20, type: lootR > 0.5 ? 'jetpack' : 'gun'}); // Дроп
                }});
                enemies.forEach((en, i) => { if(Math.abs(wx - en.x) < 40 && Math.abs(player.y - en.y) < 40) enemies.splice(i, 1); });
            }

            // Пули
            bullets.forEach((b, i) => { b.x += b.vx; enemies.forEach((en, ei) => { if(Math.abs(b.x - en.x)<20 && Math.abs(b.y-en.y)<20) { enemies.splice(ei,1); bullets.splice(i,1); } }); if(collide(b.x, b.y, 5, 5)) bullets.splice(i, 1); });

            // Мыши
            enemies.forEach(en => {
                if(en.type === 'snake') { en.x += en.vx * en.dir; if(collide(en.x + en.dir*10, en.y, 20, 20)) en.dir *= -1; }
                else if(en.type === 'bat') {
                    if(en.state === 'hang') { if(Math.abs(player.x - en.x) < 150) en.state = 'fly'; }
                    else { en.x += (player.x - en.x)*0.03; en.y += (player.y - en.y)*0.03; }
                }
                if(!player.ragdoll && Math.abs(player.x - en.x) < 25 && Math.abs(player.y - en.y) < 25) { player.ragdoll = 50; player.vx = en.x > player.x ? -5 : 5; player.vy = -4; }
            });

            // Предметы
            entities.forEach(en => { if(en.type!=='box') { en.vy+=GRAVITY; en.y+=en.vy; if(collide(en.x, en.y, en.w, en.h)){en.y-=en.vy; en.vy=0;} if(Math.abs(player.x-en.x)<30 && Math.abs(player.y-en.y)<30){ if(en.type==='jetpack')player.hasJetpack=true; if(en.type==='gun')player.hasGun=true; entities.splice(entities.indexOf(en),1); } } });

            let cX = Math.max(0, Math.min(player.x - 400, WORLD_W - 800));
            let cY = Math.max(0, Math.min(player.y - 275, WORLD_H - 550));
            ctx.fillStyle = "#1a1512"; ctx.fillRect(0,0,800,550);
            ctx.save(); ctx.translate(-cX, -cY);

            // Отрисовка блоков С ВИДИМЫМИ БОРДЮРАМИ
            ctx.strokeStyle = "#332211"; ctx.lineWidth = 1;
            world.forEach(b => {
                if(b.type==='dirt' && b.x > cX-40 && b.x < cX+840 && b.y > cY-40 && b.y < cY+590) {
                    ctx.fillStyle = "#5d4037"; ctx.fillRect(b.x, b.y, TILE, TILE);
                    ctx.strokeRect(b.x, b.y, TILE, TILE); // Те самые бордюры
                }
            });

            entities.forEach(en => { 
                if(en.type==='box') { ctx.fillStyle="#8b4513"; ctx.fillRect(en.x, en.y, 30, 30); ctx.fillStyle="white"; ctx.fillText("?", en.x+12, en.y+20); }
                if(en.type==='jetpack') { ctx.fillStyle="#0078d7"; ctx.fillRect(en.x, en.y, 20, 20); }
                if(en.type==='gun') { ctx.fillStyle="#8b4513"; ctx.fillRect(en.x, en.y, 20, 8); ctx.fillStyle="black"; ctx.fillRect(en.x+15, en.y+2, 8, 4); }
            });
            enemies.forEach(en => { if(en.type==='snake'){ctx.fillStyle="#4CAF50"; ctx.fillRect(en.x, en.y+20, 30, 10);} else {ctx.fillStyle="#666"; ctx.beginPath();ctx.arc(en.x+10, en.y+10, 8, 0, 7);ctx.fill(); ctx.fillStyle="black"; ctx.fillRect(en.x, en.y+5, 20, 2);} });
            bullets.forEach(b => { ctx.fillStyle="yellow"; ctx.fillRect(b.x, b.y, 5, 2); });

            drawStickman(player.x, player.y, player.vx, player.dir, player.ragdoll, player.crouch, player.whip, !!player.holding);
            if(player.holding) { ctx.fillStyle="#8b4513"; ctx.fillRect(player.x-2, player.y-25, 25, 25); }
            
            ctx.restore();
            ui.innerHTML = `FUEL: ${Math.floor(player.fuel)}% | ${player.hasGun?'F: Shoot':''} | X: Whip/Take | S: Crawl`;
            requestAnimationFrame(loop);
        }
        loop();
    }

    window.dragStart = (e, id) => {
        const w = document.getElementById(id); let ox = e.clientX-w.offsetLeft, oy = e.clientY-w.offsetTop;
        const m = e => { w.style.left = (e.clientX-ox)+'px'; w.style.top = (e.clientY-oy)+'px'; };
        const s = () => { window.removeEventListener('mousemove', m); window.removeEventListener('mouseup', s); };
        window.addEventListener('mousemove', m); window.addEventListener('mouseup', s);
    };

    initOS();
</script>
</body>
</html>
