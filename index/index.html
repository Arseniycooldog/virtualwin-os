<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VirtualWin OS v12.5</title>
    <style>
        :root { --accent: #0078d7; --taskbar: rgba(28, 28, 28, 0.9); --win-bg: #ffffff; --text: #000; }
        .dark-theme { --win-bg: #1e1e1e; --text: #ffffff; }
        
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; background: #000; user-select: none; }
        #desktop { width: 100vw; height: 100vh; background: url('https://images.wallpaperscraft.ru/image/single/gora_vershina_sneg_140026_1920x1080.jpg') center/cover; position: relative; transition: 0.3s; }
        
        /* Icons */
        .icons-grid { padding: 20px; display: grid; grid-template-rows: repeat(auto-fill, 95px); gap: 15px; grid-auto-flow: column; width: fit-content; }
        .icon { width: 85px; height: 95px; text-align: center; color: white; cursor: pointer; border: 1px solid transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .icon:hover { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; }
        .icon-img { font-size: 42px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .icon-label { font-size: 11px; text-shadow: 1px 1px 2px #000; margin-top: 5px; }

        /* Windows */
        .window { position: absolute; background: var(--win-bg); color: var(--text); border: 1px solid #777; box-shadow: 0 15px 40px rgba(0,0,0,0.6); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; z-index: 100; }
        .win-header { height: 35px; background: var(--win-bg); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(128,128,128,0.2); cursor: move; }
        .win-title { padding-left: 12px; font-size: 12px; font-weight: 600; }
        .win-btns { display: flex; height: 100%; }
        .win-btns button { width: 45px; height: 100%; border: none; background: transparent; color: var(--text); cursor: pointer; font-size: 16px; }
        .win-btns button:hover { background: rgba(128,128,128,0.1); }
        .win-btns .close:hover { background: #e81123; color: white; }
        .win-body { flex: 1; position: relative; overflow: auto; }

        /* Start Menu */
        #start-menu { 
            position: absolute; bottom: 45px; left: 5px; width: 320px; height: 450px; 
            background: rgba(32, 32, 32, 0.85); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; 
            display: none; flex-direction: column; z-index: 10000; color: white; padding: 15px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
        }
        .start-user { display: flex; align-items: center; gap: 10px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .start-apps { margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .start-app-item { padding: 10px; background: rgba(255,255,255,0.05); border-radius: 4px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 8px; }
        .start-app-item:hover { background: var(--accent); }

        /* Taskbar */
        .taskbar { position: absolute; bottom: 0; width: 100%; height: 45px; background: var(--taskbar); backdrop-filter: blur(15px); display: flex; align-items: center; z-index: 9999; }
        .start-btn { width: 48px; height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .start-btn:hover { background: rgba(255,255,255,0.1); }
        .start-btn svg { fill: white; width: 20px; height: 20px; }
        .start-btn:hover svg { fill: var(--accent); }
        
        .task-icons { display: flex; height: 100%; align-items: center; padding: 0 10px; gap: 8px; }
        .task-tab { padding: 0 12px; height: 32px; background: rgba(255,255,255,0.1); border-bottom: 2px solid var(--accent); color: white; display: flex; align-items: center; cursor: pointer; font-size: 12px; border-radius: 3px; }
        .clock { margin-left: auto; color: white; padding-right: 15px; font-size: 11px; text-align: right; }

        /* Spelunky HUD */
        #game-hud { position: absolute; top: 10px; left: 10px; color: #ff4444; font-weight: bold; text-shadow: 2px 2px #000; z-index: 10; font-family: monospace; font-size: 18px; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="desktop" onclick="closeStartIfOpen(event)">
    <div class="icons-grid" id="icons-grid"></div>

    <div id="start-menu">
        <div class="start-user">
            <div style="width:35px;height:35px;background:var(--accent);border-radius:50%;display:flex;justify-content:center;align-items:center;">👤</div>
            <span id="st-user-name">Administrator</span>
        </div>
        <div style="font-size: 11px; color: #aaa; margin-top: 15px;">ЗАКРЕПЛЕННЫЕ</div>
        <div class="start-apps" id="start-apps-list"></div>
        <div style="margin-top: auto; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 12px; cursor: pointer;" onclick="location.reload()">Выключение</div>
    </div>

    <div class="taskbar">
        <div class="start-btn" onclick="toggleStart(event)">
            <svg viewBox="0 0 24 24"><path d="M0 3.449L9.75 2.1V11.1H0V3.449zm0 8.536h9.75v9L0 19.686v-7.701zM10.887 1.95L24 0v11.1H10.887V1.95zm0 10.035H24v11.1l-13.113-1.815v-9.285z"/></svg>
        </div>
        <div class="task-icons" id="task-icons"></div>
        <div class="clock" id="clock"></div>
    </div>
</div>

<script>
    const apps = {
        spelunky: { name: 'Spelunky Ragdoll', icon: '📦', w: 800, h: 550 },
        explorer: { name: 'Проводник', icon: '📂', w: 600, h: 400 },
        settings: { name: 'Параметры', icon: '⚙️', w: 450, h: 450 },
        cmd: { name: 'Терминал', icon: '💻', w: 600, h: 400 }
    };

    let windows = {};
    let zIdx = 1000;
    let userName = "Admin";

    function init() {
        const grid = document.getElementById('icons-grid');
        const startApps = document.getElementById('start-apps-list');
        
        Object.keys(apps).forEach(id => {
            // Desktop Icons
            grid.innerHTML += `<div class="icon" onclick="openApp('${id}')"><span class="icon-img">${apps[id].icon}</span><span class="icon-label">${apps[id].name}</span></div>`;
            // Start Menu Icons
            startApps.innerHTML += `<div class="start-app-item" onclick="openApp('${id}')"><span>${apps[id].icon}</span> ${apps[id].name}</div>`;
        });
        
        updateClock(); setInterval(updateClock, 1000);
        document.getElementById('st-user-name').innerText = userName;
    }

    function toggleStart(e) {
        e.stopPropagation();
        const menu = document.getElementById('start-menu');
        menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
    }

    function closeStartIfOpen(e) {
        document.getElementById('start-menu').style.display = 'none';
    }

    window.openApp = (id) => {
        if(windows[id]) { restoreWin(id); return; }
        const win = document.createElement('div');
        win.id = `win-${id}`; win.className = 'window';
        win.style.width = apps[id].w + 'px'; win.style.height = apps[id].h + 'px';
        win.style.left = '80px'; win.style.top = '60px';
        win.style.zIndex = ++zIdx;

        win.innerHTML = `
            <div class="win-header" onmousedown="dragStart(event, '${id}')">
                <div class="win-title">${apps[id].icon} ${apps[id].name}</div>
                <div class="win-btns">
                    <button onclick="minimizeWin('${id}', event)">_</button>
                    <button onclick="maximizeWin('${id}', event)">▢</button>
                    <button class="close" onclick="closeWin('${id}', event)">✕</button>
                </div>
            </div>
            <div class="win-body" id="body-${id}"></div>`;
        
        document.getElementById('desktop').appendChild(win);
        windows[id] = { maximized: false };
        updateTaskbar();
        closeStartIfOpen();

        if(id === 'spelunky') startSpelunky();
        if(id === 'cmd') startTerminal();
        if(id === 'explorer') startExplorer();
        if(id === 'settings') startSettings();
    };

    function closeWin(id, e) { if(e) e.stopPropagation(); document.getElementById(`win-${id}`).remove(); delete windows[id]; updateTaskbar(); }
    function minimizeWin(id, e) { if(e) e.stopPropagation(); document.getElementById(`win-${id}`).style.display = 'none'; }
    function restoreWin(id) { document.getElementById(`win-${id}`).style.display = 'flex'; focusWin(id); }
    function focusWin(id) { document.getElementById(`win-${id}`).style.zIndex = ++zIdx; }
    function maximizeWin(id, e) {
        if(e) e.stopPropagation();
        const w = document.getElementById(`win-${id}`);
        if(!windows[id].maximized) {
            w.style.width = '100vw'; w.style.height = 'calc(100vh - 45px)'; w.style.top = '0'; w.style.left = '0';
            windows[id].maximized = true;
        } else {
            w.style.width = apps[id].w + 'px'; w.style.height = apps[id].h + 'px'; w.style.top = '60px'; w.style.left = '80px';
            windows[id].maximized = false;
        }
    }

    function updateTaskbar() {
        const bar = document.getElementById('task-icons');
        bar.innerHTML = '';
        Object.keys(windows).forEach(id => {
            bar.innerHTML += `<div class="task-tab" onclick="restoreWin('${id}')">${apps[id].icon}</div>`;
        });
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerHTML = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + "<br>" + now.toLocaleDateString();
    }

    // --- GAMES & APPS LOGIC (Simplified for Spelunky Ragdoll context) ---
    function startSpelunky() {
        const b = document.getElementById('body-spelunky');
        b.innerHTML = `<div id="game-hud">HP: ❤️❤️❤️❤️ | GOLD: 0</div><canvas id="sc" width="800" height="515"></canvas>`;
        const canvas = b.querySelector('#sc'), ctx = canvas.getContext('2d');
        const TILE = 40, GRAV = 0.6;
        let p = { x: 80, y: 100, vx: 0, vy: 0, hp: 4, gold: 0, dead: false, hurt: 0, dir: 1, anim: 0, ragdoll: null };
        let level = [], enemies = [], coins = [];
        let keys = {};

        for(let i=0; i<60; i++) {
            level.push({x: i*TILE, y: 440});
            if(Math.random() > 0.8) level.push({x: i*TILE, y: 300});
            if(Math.random() > 0.9) coins.push({x: i*TILE+15, y: 410});
            if(Math.random() > 0.96) enemies.push({x: i*TILE, y: 410, vx: 2, startX: i*TILE});
        }

        const kd = e => keys[e.code] = true;
        const ku = e => keys[e.code] = false;
        window.addEventListener('keydown', kd); window.addEventListener('keyup', ku);

        function die() {
            p.dead = true;
            p.ragdoll = [
                {x: p.x+10, y: p.y, vx: Math.random()*6-3, vy: -6, type:'head'},
                {x: p.x+10, y: p.y+15, vx: Math.random()*6-3, vy: -4, type:'body'},
                {x: p.x+5, y: p.y+25, vx: Math.random()*4-2, vy: -2, type:'leg'},
                {x: p.x+15, y: p.y+25, vx: Math.random()*4-2, vy: -2, type:'leg'}
            ];
        }

        function gameLoop() {
            if(!windows['spelunky']) {
                window.removeEventListener('keydown', kd);
                window.removeEventListener('keyup', ku);
                return;
            }
            ctx.fillStyle = "#1a0f0a"; ctx.fillRect(0, 0, 800, 515);
            ctx.save(); ctx.translate(-p.x + 350, 0);

            if(!p.dead) {
                if(keys['KeyA']) { p.vx = -4.5; p.dir = -1; p.anim += 0.2; }
                else if(keys['KeyD']) { p.vx = 4.5; p.dir = 1; p.anim += 0.2; }
                else p.vx *= 0.8;
                if(keys['Space'] && p.onG) { p.vy = -12; p.onG = false; }
                if(keys['KeyX']) p.whip = 10;

                p.vy += GRAV; p.x += p.vx; p.y += p.vy;
                p.onG = false;

                level.forEach(b => {
                    if(p.x+20 > b.x && p.x < b.x+TILE && p.y+35 > b.y && p.y < b.y+TILE) {
                        if(p.vy > 0) { p.y = b.y-35; p.vy = 0; p.onG = true; }
                    }
                });

                enemies.forEach((en, i) => {
                    en.x += en.vx; if(Math.abs(en.x - en.startX) > 120) en.vx *= -1;
                    if(p.whip > 0 && Math.abs(p.x + p.dir*30 - en.x) < 40) enemies.splice(i, 1);
                    else if(p.hurt <= 0 && Math.abs(p.x - en.x) < 25 && Math.abs(p.y - en.y) < 30) {
                        p.hp--; p.hurt = 60; p.vy = -6; p.vx = p.dir * -8;
                        if(p.hp <= 0) die();
                    }
                });
                coins.forEach((c, i) => { if(Math.abs(p.x - c.x) < 25) { p.gold += 500; coins.splice(i, 1); }});
                if(p.hurt > 0) p.hurt--; if(p.whip > 0) p.whip--;
            } else {
                p.ragdoll.forEach(part => {
                    part.vy += 0.5; part.x += part.vx; part.y += part.vy;
                    if(part.y > 425) { part.y = 425; part.vy *= -0.2; part.vx *= 0.9; }
                    ctx.fillStyle = "white";
                    if(part.type === 'head') { ctx.beginPath(); ctx.arc(part.x, part.y, 7, 0, 7); ctx.fill(); }
                    else ctx.fillRect(part.x, part.y, 4, 12);
                });
            }

            ctx.fillStyle = "#5d4037"; level.forEach(b => ctx.fillRect(b.x, b.y, TILE, TILE));
            ctx.fillStyle = "gold"; coins.forEach(c => { ctx.beginPath(); ctx.arc(c.x, c.y, 6, 0, 7); ctx.fill(); });
            ctx.fillStyle = "red"; enemies.forEach(en => ctx.fillRect(en.x, en.y+15, 25, 15));

            if(!p.dead) {
                ctx.globalAlpha = p.hurt % 10 < 5 ? 1 : 0.4;
                ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.beginPath();
                ctx.arc(p.x+12, p.y+8, 7, 0, 7); 
                ctx.moveTo(p.x+12, p.y+15); ctx.lineTo(p.x+12, p.y+28); 
                let w = Math.sin(p.anim) * 8;
                ctx.moveTo(p.x+12, p.y+28); ctx.lineTo(p.x+12+w, p.y+38);
                ctx.moveTo(p.x+12, p.y+28); ctx.lineTo(p.x+12-w, p.y+38);
                ctx.moveTo(p.x+12, p.y+18); ctx.lineTo(p.x + (p.whip > 0 ? 35*p.dir : 22), p.y+22);
                ctx.stroke();
                if(p.whip > 0) { ctx.strokeStyle = "orange"; ctx.beginPath(); ctx.arc(p.x+12, p.y+18, 45, p.dir>0?-0.5:2.5, p.dir>0?0.5:3.8); ctx.stroke(); }
                ctx.globalAlpha = 1;
            }

            ctx.restore();
            document.getElementById('game-hud').innerHTML = `HP: ${"❤️".repeat(Math.max(0,p.hp))} | GOLD: ${p.gold}`;
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    }

    function startTerminal() {
        const b = document.getElementById('body-cmd');
        b.innerHTML = `<div class="term-log" style="background:#000;color:#0f0;height:100%;padding:10px;font-family:monospace;">C:\\Users\\${userName}> <input id="tin" style="background:transparent;border:none;color:#0f0;outline:none;width:70%"></div>`;
        const input = b.querySelector('#tin');
        input.onkeydown = (e) => { if(e.key === 'Enter') { b.querySelector('.term-log').innerHTML += `<br>C:\\Users\\${userName}> ${input.value}<br>Unknown command.`; input.value = ""; }};
    }

    function startExplorer() { document.getElementById('body-explorer').innerHTML = `<div style="padding:15px; display:flex; gap:10px;"><div class="exp-item">📁<br>System</div><div class="exp-item">📁<br>Users</div></div>`; }

    function startSettings() {
        document.getElementById('body-settings').innerHTML = `<div style="padding:20px;"><h3>Settings</h3><button onclick="document.body.classList.toggle('dark-theme')">Dark Mode</button></div>`;
    }

    function dragStart(e, id) {
        const win = document.getElementById(`win-${id}`);
        let ox = e.clientX - win.offsetLeft, oy = e.clientY - win.offsetTop;
        const move = (ev) => { win.style.left = (ev.clientX - ox) + 'px'; win.style.top = (ev.clientY - oy) + 'px'; };
        const end = () => window.removeEventListener('mousemove', move);
        window.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
        focusWin(id);
    }

    init();
</script>
</body>
</html>
